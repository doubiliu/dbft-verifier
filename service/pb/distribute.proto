syntax = "proto3";// 协议为proto3

package proto;
option go_package="/distribute";

message BlockDistributeRequest{
  bytes header = 1; // json
  bool is_reliable = 2; // the first block, no parent proof, send to aggregator
}
message BlockDistributeResponse{
  bool success = 1;
}

service DistributeService{
  rpc SendBlock (BlockDistributeRequest) returns (BlockDistributeResponse){}
}